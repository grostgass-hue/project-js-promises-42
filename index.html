<!doctype html>
<html lang="uk">
  <head>
    <meta charset="UTF-8" />
    <title>Dance</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <header class="header">
      <h1>DANCE</h1>
    </header>

    <section class="hero">
      <h2>Title Here</h2>
      <p>Lorem ipsum dolor sit amet</p>
      <button id="fetch-posts-btn">Get Info</button>
    </section>

    <section class="tour">
      <h2>DANCE TOUR</h2>
      <div class="cards tour-cards">
        <div class="card">America</div>
        <div class="card">Asia</div>
        <div class="card">Europe</div>
      </div>
    </section>

    <section class="pricing">
      <h2>PRICING</h2>
      <div class="cards pricing-cards">
        <div class="card">$10</div>
        <div class="card">$20</div>
        <div class="card">$30</div>
      </div>
    </section>

    <section class="posts">
      <h2>Posts</h2>
      <ul id="posts-list"></ul>
    </section>

    <section class="image-block">
      <div class="text">
        <h2>AMAZING DANCE</h2>
        <p>Lorem ipsum dolor sit amet</p>
      </div>
    </section>

    <section class="stats">
      <h2>OUR STATISTICS</h2>
      <div class="numbers">
        <div>1240+</div>
        <div>2000+</div>
        <div>1000+</div>
      </div>
    </section>

    <section class="subscribe">
      <h2>SUBSCRIBE</h2>
      <input type="email" placeholder="Your email" />
      <button>Send</button>
    </section>

    <footer class="footer">
      <p>© 2026 Dance</p>
    </footer>

    <script src="script.js"></script>
  </body>
</html>
